<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Vox</title>
  <link rel="stylesheet" href="/ui/css/vox.css">
  <style>
    html, body { height: 100%; overflow: hidden; }

    /* ── App shell layout ──────────────────────────────────────────────── */
    .app-shell {
      display: flex; height: 100vh; height: 100dvh; overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 0.5px solid var(--border);
      background: var(--bg);
      padding: 0;
      overflow: hidden;
    }
    .sidebar-header {
      display: flex; align-items: center; gap: 9px;
      padding: 16px 18px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .sidebar-wordmark { font-size: 16px; font-weight: 500; letter-spacing: -0.03em; }

    .sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      height: 36px; padding: 0 10px; border-radius: var(--r-md);
      font-size: 13.5px; font-weight: 500; color: var(--text-2);
      cursor: pointer; text-decoration: none; border: none;
      background: none; width: 100%; text-align: left;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }
    .nav-item:hover { background: var(--bg-2); color: var(--text); }
    .nav-item.active { background: var(--bg-2); color: var(--text); }
    .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

    .sidebar-footer {
      padding: 12px 16px 16px;
      border-top: 0.5px solid var(--border);
      display: flex; flex-direction: column; gap: 10px;
    }
    .status-row {
      display: flex; align-items: center; gap: 7px;
      font-size: 11.5px; color: var(--text-3);
    }

    /* ── Main content ──────────────────────────────────────────────────── */
    .main {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .topbar {
      display: flex; align-items: center; gap: 0;
      height: 52px; padding: 0 24px;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .topbar-title { font-size: 15px; font-weight: 500; }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .content { flex: 1; padding: 28px 32px; }

    /* ── Screen: Generate ──────────────────────────────────────────────── */
    .generate-layout {
      display: grid; grid-template-columns: 1fr 320px; gap: 20px;
      max-width: 1100px;
    }

    .gen-panel {
      border: 0.5px solid var(--border); border-radius: var(--r-xl);
    }
    .gen-textarea-wrap { padding: 20px 20px 0; }
    #gen-text {
      width: 100%; min-height: 200px; max-height: 400px;
      border: none; outline: none; resize: none;
      font-family: var(--font); font-size: 15px; line-height: 1.65;
      color: var(--text); background: transparent;
    }
    #gen-text::placeholder { color: var(--text-3); }
    .gen-char-count {
      padding: 6px 20px 14px;
      font-size: 11px; color: var(--text-3);
      text-align: right;
    }
    .gen-char-count.warn { color: var(--warning); }
    .gen-char-count.over { color: var(--error); }

    .gen-toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; border-top: 0.5px solid var(--border);
      background: var(--bg-2);
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      flex-wrap: wrap;
    }

    /* ── Custom Tone Panel ───────────────────────────────────────────────── */
    .custom-panel {
      border: 0.5px solid var(--border-2); border-radius: var(--r-lg);
      background: var(--bg); margin-top: 8px; overflow: hidden;
    }
    .custom-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg-2);
    }
    .custom-panel-title {
      font-size: 12px; font-weight: 600; color: var(--text-2);
      display: flex; align-items: center; gap: 6px;
    }
    .custom-panel-title-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #534AB7;
    }
    .custom-panel-toggle {
      font-size: 11px; color: var(--text-3); cursor: pointer;
      background: none; border: none; padding: 2px 6px;
      border-radius: 4px; transition: all 0.12s; font-family: var(--font);
    }
    .custom-panel-toggle:hover { background: var(--bg-3); color: var(--text); }
    .custom-panel-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .param-row {
      display: grid; grid-template-columns: 140px 1fr 52px;
      align-items: center; gap: 12px;
    }
    .param-row-label { display: flex; flex-direction: column; gap: 2px; }
    .param-row-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .param-row-hint { font-size: 10px; color: var(--text-3); line-height: 1.4; }
    .param-row-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px;
      background: var(--bg-3); outline: none; cursor: pointer;
    }
    .param-row-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #534AB7;
      cursor: pointer; border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px #534AB7;
      transition: transform 0.1s;
    }
    .param-row-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .param-row-input {
      width: 52px; text-align: right; font-size: 12px; font-weight: 500;
      color: var(--text); background: var(--bg-2);
      border: 0.5px solid var(--border-2); border-radius: var(--r-sm);
      padding: 4px 6px;
    }
    .param-row-input.error { border-color: var(--error); color: var(--error); }
    .param-row-input:focus { outline: none; border-color: #534AB7; }
    .param-error-text { font-size: 10px; color: var(--error); margin-top: -8px; margin-left: 152px; }
    .custom-panel-footer {
      padding: 12px 16px; border-top: 0.5px solid var(--border);
      background: var(--bg-2); display: flex; align-items: center; gap: 10px;
    }
    .custom-save-btn {
      padding: 6px 16px; border-radius: var(--r-sm); font-size: 12px;
      font-weight: 600; border: none; background: #534AB7; color: white;
      cursor: pointer; font-family: var(--font); transition: all 0.12s;
    }
    .custom-save-btn:hover { background: #7F77DD; }
    .custom-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .custom-reset-btn {
      padding: 6px 12px; border-radius: var(--r-sm); font-size: 12px;
      font-weight: 500; border: 0.5px solid var(--border-2);
      background: none; color: var(--text-2);
      cursor: pointer; font-family: var(--font); transition: all 0.12s;
    }
    .custom-reset-btn:hover { background: var(--bg-3); }
    .custom-save-status { font-size: 11px; color: var(--text-3); margin-left: auto; }

    /* ETA progress bar — generation */
    .eta-bar-wrap {
      width: 100%; display: flex; flex-direction: column; gap: 5px;
      padding: 4px 0 2px; order: 10;
    }
    .eta-bar-track {
      height: 3px; background: var(--border-2); border-radius: 99px; overflow: hidden;
    }
    .eta-bar-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #534AB7, #7F77DD);
      transition: width 0.9s linear;
    }
    .eta-bar-label {
      font-size: 11px; color: var(--text-3);
      display: flex; justify-content: space-between;
    }

    /* Upload progress bar */
    .upload-progress-wrap {
      margin-top: 10px; display: flex; flex-direction: column; gap: 5px;
    }
    .upload-progress-track {
      height: 4px; background: var(--border-2); border-radius: 99px; overflow: hidden;
    }
    .upload-progress-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, #534AB7, #7F77DD);
      transition: width 0.2s ease;
    }
    .upload-progress-label {
      font-size: 11px; color: var(--text-3);
      display: flex; justify-content: space-between;
    }

    /* Preset pills */
    .preset-pills { display: flex; gap: 5px; flex-wrap: wrap; }
    .preset-pill {
      height: 28px; padding: 0 12px; border-radius: 14px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 0.5px solid var(--border-2);
      background: var(--bg); color: var(--text-2);
      transition: all 0.12s;
    }
    .preset-pill.active {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }
    .preset-pill:hover:not(.active) { background: var(--bg-3); color: var(--text); }

    /* Generate button states */
    #gen-btn { min-width: 120px; margin-left: auto; }
    #gen-btn.loading { pointer-events: none; }

    /* ── Audio player ──────────────────────────────────────────────────── */
    .audio-player {
      border: 0.5px solid var(--border); border-radius: var(--r-xl);
      background: var(--bg);
    }
    .player-header {
      padding: 16px 20px 0;
      font-size: 12px; font-weight: 500; color: var(--text-2);
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .player-empty {
      padding: 40px 20px;
      text-align: center; color: var(--text-3); font-size: 13px;
    }
    .player-waveform {
      display: flex; align-items: center; gap: 2px;
      padding: 16px 20px 8px; height: 64px; overflow: hidden;
    }
    .pw-bar {
      flex: 1; border-radius: 2px; background: var(--bg-3);
      min-width: 2px; transition: height 0.3s ease;
    }
    .pw-bar.played { background: var(--text); }
    .player-controls {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px 16px;
    }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--text); color: var(--bg);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; transition: opacity 0.15s;
    }
    .play-btn:hover { opacity: 0.8; }
    .player-time { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; min-width: 70px; }
    .player-seek {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 3px; border-radius: 2px; background: var(--bg-3); cursor: pointer; outline: none;
    }
    .player-seek::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--text); cursor: pointer;
      box-shadow: var(--sh-sm);
    }

    /* ── Settings panel (right sidebar) ──────────────────────────────── */
    .settings-panel {
      border: 0.5px solid var(--border); border-radius: var(--r-xl);
      background: var(--bg);
    }
    .settings-section { padding: 16px 18px; }
    .settings-section + .settings-section { border-top: 0.5px solid var(--border); }
    .settings-section-title {
      font-size: 11px; font-weight: 500; color: var(--text-3);
      letter-spacing: 0.07em; text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* Stats card after generation */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-item { padding: 10px 12px; background: var(--bg-2); border-radius: var(--r-md); }
    .stat-label { font-size: 10px; color: var(--text-3); margin-bottom: 3px; letter-spacing: 0.04em; text-transform: uppercase; }
    .stat-value { font-size: 15px; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }

    /* ── Screen: Voices ────────────────────────────────────────────────── */
    .voices-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px; max-width: 1100px;
    }
    .voice-card {
      border: 0.5px solid var(--border); border-radius: var(--r-lg);
      padding: 18px 20px; background: var(--bg);
      display: flex; flex-direction: column; gap: 10px;
      cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s;
    }
    .voice-card:hover { border-color: var(--border-2); box-shadow: var(--sh-sm); }
    .voice-card.selected { border-color: var(--text); box-shadow: 0 0 0 1px var(--text); }

    .voice-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg-2); border: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .voice-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .voice-desc { font-size: 12px; color: var(--text-2); line-height: 1.55; }
    .voice-actions { display: flex; gap: 6px; margin-top: 4px; }

    /* Tag badges */
    .tag-badge {
      display: inline-flex; align-items: center; gap: 4px;
      height: 18px; padding: 0 7px; border-radius: 9px;
      font-size: 10px; font-weight: 500; letter-spacing: 0.03em;
      border: 0.5px solid var(--border-2);
      background: var(--bg-2); color: var(--text-2);
    }
    .tag-badge.tag-uploaded   { background: #E0EFFE; color: #003D87; border-color: #BAD5FC; }
    .tag-badge.tag-auto-import{ background: #E4F7E6; color: #196329; border-color: #C0E7C4; }

    /* Edit modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal {
      background: var(--bg); border-radius: var(--r-xl);
      box-shadow: var(--sh-lg);
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      border: 0.5px solid var(--border);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .modal-title { font-size: 15px; font-weight: 500; }
    .modal-close {
      width: 28px; height: 28px; border-radius: var(--r-sm);
      background: var(--bg-2); border: 0.5px solid var(--border);
      color: var(--text-2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 0.5px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .modal-section-title {
      font-size: 11px; font-weight: 500; color: var(--text-3);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Tag editor */
    .tag-editor { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag-chip {
      display: inline-flex; align-items: center; gap: 5px;
      height: 24px; padding: 0 8px; border-radius: 12px;
      font-size: 11px; font-weight: 500;
      background: var(--bg-2); border: 0.5px solid var(--border-2);
      color: var(--text);
    }
    .tag-chip-remove {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 12px; padding: 0; line-height: 1;
    }
    .tag-chip-remove:hover { color: var(--error); }
    .tag-add-input {
      height: 24px; padding: 0 8px; border-radius: 12px;
      border: 0.5px dashed var(--border-2); background: transparent;
      font-family: var(--font); font-size: 11px; color: var(--text);
      outline: none; width: 100px;
    }
    .tag-add-input:focus { border-color: var(--text); }

    /* Advanced params toggle */
    .advanced-toggle {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--text-2); cursor: pointer;
      background: none; border: none; padding: 0; font-family: var(--font);
    }
    .advanced-toggle:hover { color: var(--text); }
    .params-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .param-field label { display: block; font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .param-field input { width: 100%; height: 32px; padding: 0 10px; border: 0.5px solid var(--border-2); border-radius: var(--r-sm); font-family: var(--font); font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
    .param-field input:focus { border-color: var(--text); }

    /* Upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border-2); border-radius: var(--r-xl);
      padding: 40px 32px; text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      max-width: 480px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--text); background: var(--bg-2);
    }
    .upload-icon { font-size: 32px; margin-bottom: 12px; }
    .upload-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
    .upload-sub { font-size: 12px; color: var(--text-3); line-height: 1.6; }

    /* Voice upload form */
    .voice-form { max-width: 480px; }
    .voice-form-file { display: none; }

    /* Add-voice tabs */
    .add-voice-tabs {
      display: flex; gap: 0; border-bottom: 0.5px solid var(--border); margin-bottom: 20px;
    }
    .add-voice-tab {
      padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; background: none; color: var(--text-3);
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
    }
    .add-voice-tab.active { color: var(--text); border-bottom-color: var(--text); }

    /* Recorder */
    .recorder-zone {
      border: 1.5px dashed var(--border-2); border-radius: var(--r-xl);
      padding: 32px; text-align: center; max-width: 480px;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }
    .rec-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--error); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.4);
    }
    .rec-btn:hover { transform: scale(1.06); }
    .rec-btn.recording {
      animation: rec-pulse 1.4s ease-in-out infinite;
      background: var(--error);
    }
    .rec-btn.has-audio { background: var(--bg-2); border: 1.5px solid var(--border-2); }
    @keyframes rec-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      50%      { box-shadow: 0 0 0 14px rgba(239,68,68,0); }
    }
    .rec-icon { font-size: 22px; line-height: 1; }
    .rec-timer {
      font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums;
      color: var(--text); letter-spacing: 0.04em;
    }
    .rec-status { font-size: 13px; color: var(--text-3); }
    .rec-hint   { font-size: 12px; color: var(--text-3); opacity: 0.7; margin-top: 4px; }
    .rec-waveform {
      width: 100%; max-width: 340px; height: 48px;
      display: flex; align-items: center; justify-content: center; gap: 2px;
    }
    .rec-waveform canvas { width: 100%; height: 100%; }
    .rec-preview {
      width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .rec-preview audio { width: 100%; height: 36px; }
    .rec-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ── Screen: History ───────────────────────────────────────────────── */
    .history-filters {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-pill {
      height: 28px; padding: 0 12px; border-radius: 14px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      border: 0.5px solid var(--border-2);
      background: var(--bg); color: var(--text-2);
      transition: all 0.12s;
    }
    .filter-pill.active {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }

    .history-scroll {
      overflow-x: auto; border: 0.5px solid var(--border);
      border-radius: var(--r-lg); max-width: 1100px;
    }
    .history-table {
      width: 100%; border-collapse: collapse; min-width: 700px;
    }
    .history-table th {
      padding: 10px 16px; text-align: left;
      font-size: 11px; font-weight: 500; color: var(--text-3);
      letter-spacing: 0.06em; text-transform: uppercase;
      background: var(--bg-2); border-bottom: 0.5px solid var(--border);
      white-space: nowrap;
    }
    .history-table td {
      padding: 10px 16px; font-size: 13px; color: var(--text);
      border-bottom: 0.5px solid var(--border);
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: var(--bg-2); }
    .history-table .text-cell {
      max-width: 260px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
      color: var(--text-2);
    }
    .rid-cell {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
      white-space: nowrap;
    }
    .copy-cell {
      display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .copy-btn {
      width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
      background: var(--bg-2); border: 0.5px solid var(--border);
      color: var(--text-2); cursor: pointer; font-size: 11px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      padding: 0;
    }
    .copy-btn:hover { background: var(--bg-3); border-color: var(--border-2); color: var(--text); }
    .copy-btn.copied { color: #196329; border-color: #C0E7C4; background: #E4F7E6; }

    /* ── Screen: Settings ──────────────────────────────────────────────── */
    .settings-page { max-width: 560px; }
    .settings-group { margin-bottom: 32px; }
    .settings-group-title {
      font-size: 12px; font-weight: 500; color: var(--text-3);

    .settings-row-label { font-size: 13px; color: var(--text); }
    .settings-row-value { font-size: 13px; color: var(--text-2); font-family: var(--font-mono); }

    /* ── Tooltip ───────────────────────────────────────────────────────── */
    .tip-icon {

      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--r-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Empty state ───────────────────────────────────────────────────── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 64px 32px; text-align: center;
    }
    .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; }

    /* Responsive: collapse sidebar */
    @media (max-width: 700px) {
      .sidebar { width: 60px; }
      .sidebar-wordmark, .nav-item span:not(.nav-icon) { display: none; }
      .sidebar-footer { padding: 10px 8px; }

      .generate-layout { grid-template-columns: 1fr; }
      .content { padding: 16px 16px calc(32px + env(safe-area-inset-bottom, 0px)); }

  </style>

<script>
(function() {
  const tip = document.getElementById('global-tip');
  document.addEventListener('mouseover', (e) => {
    const icon = e.target.closest('[data-tip]');
    if (!icon) return;
    tip.textContent = icon.dataset.tip;
    tip.style.display = 'block';
    const r = icon.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    // prefer right of icon; fall back to left if no room
    let left = r.right + 10;
    if (left + tw > window.innerWidth - 8) left = r.left - tw - 10;
    let top = r.top + r.height / 2 - th / 2;
    top = Math.max(8, Math.min(top, window.innerHeight - th - 8));
    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
  });
  document.addEventListener('mouseout', (e) => {
    if (e.target.closest('[data-tip]')) tip.style.display = 'none';
  });
})();
</script>

<script type="module">
import { healthCheck, listVoices, listJobs, listPresets, generateTTS, uploadVoice, uploadVoiceWithProgress, deleteVoice, patchVoice } from '/ui/js/api.js';
import { toast, toastError, toastSuccess } from '/ui/js/toast.js';

// ── State ────────────────────────────────────────────────────────────────────

// Default values seeded from the server-side "default" preset
const CUSTOM_DEFAULTS = {
  exaggeration:      0.5,
  cfg_weight:        0.5,
  temperature:       0.8,
  repetition_penalty:1.2,
  top_p:             1.0,
  min_p:             0.05,
};

function loadCustomParams() {
  try {
    const saved = localStorage.getItem('vox_custom_params');
    return saved ? { ...CUSTOM_DEFAULTS, ...JSON.parse(saved) } : { ...CUSTOM_DEFAULTS };
  } catch { return { ...CUSTOM_DEFAULTS }; }
}

const state = {
  screen: 'generate',
  voices: [],
  presets: {},
  health: null,
  jobs: [],
  generate: {
    text: '',
    preset: 'default',
    voice_name: null,
    format: 'mp3',
    result: null,   // { blob, headers, url }
    loading: false,
    customParams: loadCustomParams(),
    customPanelOpen: false,
  },
  upload: { file: null, name: '', description: '' },
};

// ── Router ───────────────────────────────────────────────────────────────────

function navigate(screen) {
  state.screen = screen;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.screen === screen);
  });
  document.getElementById('screen-title').textContent =
    { generate: 'Generate', voices: 'Voices', history: 'History', settings: 'Settings' }[screen] ?? screen;
  render();
}

document.querySelectorAll('.nav-item[data-screen]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.screen));
});

// ── Render dispatcher ─────────────────────────────────────────────────────────

function render() {
  const el = document.getElementById('screen-content');
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';

  if (state.screen === 'generate') { renderGenerate(el, actions); }
  else if (state.screen === 'voices')   { renderVoices(el, actions); }
  else if (state.screen === 'history')  { renderHistory(el, actions); }
  else if (state.screen === 'settings') { renderSettings(el, actions); }
}

// ── Screen: Generate ──────────────────────────────────────────────────────────

const CUSTOM_PARAMS_META = [
  { key: 'exaggeration',       label: 'Exaggeration',        hint: 'Delivery drama & pace. Higher = more expressive.',  min: 0,   max: 2,   step: 0.05 },
  { key: 'cfg_weight',         label: 'CFG Weight',          hint: 'How closely the model follows the voice prompt.',   min: 0,   max: 1,   step: 0.05 },
  { key: 'temperature',        label: 'Temperature',         hint: 'Randomness. Higher = more varied, natural delivery.',min: 0,   max: 1,   step: 0.05 },
  { key: 'repetition_penalty', label: 'Repetition Penalty',  hint: 'Discourages repeated sounds. Keep near 1.2.',        min: 1,   max: 2,   step: 0.05 },
  { key: 'top_p',              label: 'Top P',               hint: 'Nucleus sampling threshold.',                       min: 0,   max: 1,   step: 0.05 },
  { key: 'min_p',              label: 'Min P',               hint: 'Minimum token probability floor.',                  min: 0,   max: 0.5, step: 0.01 },
];

function renderCustomPanel(g) {
  const p = g.customParams;
  const open = g.customPanelOpen;
  return `
    <div class="custom-panel" id="custom-panel">
      <div class="custom-panel-header">
        <div class="custom-panel-title">
          <span class="custom-panel-title-dot"></span>
          Custom Tone Parameters
        </div>
        <button class="custom-panel-toggle" id="custom-panel-toggle">
          ${open ? '▲ Collapse' : '▼ Expand'}
        </button>
      </div>
      ${open ? `
      <div class="custom-panel-body" id="custom-panel-body">
        ${CUSTOM_PARAMS_META.map(m => `
          <div>
            <div class="param-row">
              <div class="param-row-label">
                <span class="param-row-name">${m.label}</span>
                <span class="param-row-hint">${m.hint}</span>
              </div>
              <input type="range" class="param-row-slider" id="slider-${m.key}"
                min="${m.min}" max="${m.max}" step="${m.step}"
                value="${p[m.key] ?? m.min}">
              <input type="number" class="param-row-input" id="input-${m.key}"
                min="${m.min}" max="${m.max}" step="${m.step}"
                value="${p[m.key] ?? ''}">
            </div>
            <div class="param-error-text" id="err-${m.key}" style="display:none"></div>
          </div>
        `).join('')}
      </div>
      <div class="custom-panel-footer">
        <button class="custom-save-btn" id="custom-save-btn">Save</button>
        <button class="custom-reset-btn" id="custom-reset-btn">Reset to defaults</button>
        <span class="custom-save-status" id="custom-save-status"></span>
      </div>` : ''}
    </div>`;
}

function wireCustomPanel(el) {
  const g = state.generate;

  const toggleBtn = el.querySelector('#custom-panel-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', () => {
      g.customPanelOpen = !g.customPanelOpen;
      // re-render just the panel in-place
      const existing = el.querySelector('#custom-panel');
      if (existing) existing.outerHTML = renderCustomPanel(g);
      wireCustomPanel(el);
    });
  }

  if (!g.customPanelOpen) return;

  // Sync slider ↔ number input
  CUSTOM_PARAMS_META.forEach(m => {
    const slider = el.querySelector(`#slider-${m.key}`);
    const input  = el.querySelector(`#input-${m.key}`);
    const errEl  = el.querySelector(`#err-${m.key}`);
    if (!slider || !input) return;

    function syncFromSlider() {
      input.value = slider.value;
      input.classList.remove('error');
      errEl.style.display = 'none';
    }
    function syncFromInput() {
      const v = parseFloat(input.value);
      if (isNaN(v) || v < m.min || v > m.max) {
        input.classList.add('error');
        errEl.textContent = `Must be between ${m.min} and ${m.max}`;
        errEl.style.display = 'block';
      } else {
        input.classList.remove('error');
        errEl.style.display = 'none';
        slider.value = v;
      }
    }
    slider.addEventListener('input', syncFromSlider);
    input.addEventListener('input', syncFromInput);
    input.addEventListener('change', syncFromInput);
  });

  // Reset
  el.querySelector('#custom-reset-btn')?.addEventListener('click', () => {
    CUSTOM_PARAMS_META.forEach(m => {
      const s = el.querySelector(`#slider-${m.key}`);
      const i = el.querySelector(`#input-${m.key}`);
      const e = el.querySelector(`#err-${m.key}`);
      if (s) s.value = CUSTOM_DEFAULTS[m.key];
      if (i) { i.value = CUSTOM_DEFAULTS[m.key]; i.classList.remove('error'); }
      if (e) e.style.display = 'none';
    });
    el.querySelector('#custom-save-status').textContent = '';
  });

  // Save
  el.querySelector('#custom-save-btn')?.addEventListener('click', () => {
    let hasError = false;
    const newParams = {};

    CUSTOM_PARAMS_META.forEach(m => {
      const input = el.querySelector(`#input-${m.key}`);
      const errEl = el.querySelector(`#err-${m.key}`);
      const v = parseFloat(input?.value);
      if (input && (isNaN(v) || v < m.min || v > m.max || input.value.trim() === '')) {
        input.classList.add('error');
        errEl.textContent = input.value.trim() === ''
          ? 'Required — cannot be empty'
          : `Must be between ${m.min} and ${m.max}`;
        errEl.style.display = 'block';
        hasError = true;
      } else {
        newParams[m.key] = v;
      }
    });

    if (hasError) return;

    g.customParams = newParams;
    try { localStorage.setItem('vox_custom_params', JSON.stringify(newParams)); } catch {}

    const status = el.querySelector('#custom-save-status');
    status.textContent = '✓ Saved';
    setTimeout(() => { if (status) status.textContent = ''; }, 2000);
  });
}

function renderGenerate(el, actions) {
  const g = state.generate;
  const MAX = 3000;
  const len = g.text.length;
  const isOver = len > MAX;
  const isWarn = len > 2700;

  el.innerHTML = `
    <div class="generate-layout">
      <!-- LEFT: text + toolbar -->
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="gen-panel">
          <div class="gen-textarea-wrap">
            <textarea id="gen-text" class="input" style="border:none;padding:0;border-radius:0;font-size:15px;min-height:220px;background:transparent;"
              placeholder="Type or paste your script here…" maxlength="${MAX + 200}">${escHtml(g.text)}</textarea>
          </div>
          <div class="gen-char-count ${isOver ? 'over' : isWarn ? 'warn' : ''}">
            ${len.toLocaleString()} / ${MAX.toLocaleString()} chars
          </div>

          <div class="gen-toolbar">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span style="font-size:11px;font-weight:500;color:var(--text-3);letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;">
                Tone
                <span class="tip-icon" data-tip="Controls the speaking style. Default is neutral. YouTube is expressive and engaging. Hype is high-energy. News is calm and measured. Custom lets you dial in your own parameters.">?</span>
              </span>
              <div class="preset-pills" role="group" aria-label="Tone">
                ${Object.keys(state.presets).map(p => `
                  <button class="preset-pill ${p === g.preset ? 'active' : ''}" data-preset="${p}">${p}</button>
                `).join('')}
                <button class="preset-pill ${g.preset === 'custom' ? 'active' : ''}" data-preset="custom" style="${g.preset === 'custom' ? 'border-color:#534AB7;color:#534AB7;background:rgba(83,74,183,0.1);' : ''}">✦ Custom</button>
              </div>
            </div>
            <button id="gen-btn" class="btn btn-primary ${g.loading ? 'loading' : ''}" ${g.loading || isOver ? 'disabled' : ''}>
              ${g.loading ? '<span class="spinner"></span> Generating…' : '✦ Generate'}
            </button>
            ${g.loading ? `
            <div class="eta-bar-wrap" id="eta-bar-wrap">
              <div class="eta-bar-track"><div class="eta-bar-fill" id="eta-bar-fill" style="width:0%"></div></div>
              <div class="eta-bar-label">
                <span id="eta-elapsed">0s elapsed</span>
                <span id="eta-remaining">Estimating…</span>
              </div>
            </div>` : ''}
          </div>

          ${g.preset === 'custom' ? renderCustomPanel(g) : ''}
        </div>

        <!-- Audio player -->
        ${renderPlayer(g.result)}
      </div>

      <!-- RIGHT: settings panel -->
      <div class="settings-panel">
        <div class="settings-section">
          <div class="settings-section-title" style="display:flex;align-items:center;gap:5px;">
            Voice Profile
            <span class="tip-icon" data-tip="Select a saved voice to clone. Each profile is a short audio sample Vox uses to match the speaker's tone and style. Choose Generic to use the model's built-in voice.">?</span>
          </div>
          <select id="voice-select" class="select">
            <option value="">Generic</option>
            ${state.voices.map(v => `<option value="${escAttr(v.name)}" ${g.voice_name === v.name ? 'selected' : ''}>${escHtml(v.name)}</option>`).join('')}
          </select>
        </div>

        <div class="settings-section">
          <div class="settings-section-title" style="display:flex;align-items:center;gap:5px;">
            Output Format
            <span class="tip-icon" data-tip="MP3 is smaller and works everywhere. WAV is uncompressed and ideal for editing or post-production. Both are generated locally on your device.">?</span>
          </div>
          <div style="display:flex;gap:6px;">
            ${['mp3','wav'].map(f => `
              <button class="preset-pill ${g.format === f ? 'active' : ''}" data-format="${f}" style="flex:1;justify-content:center;">
                ${f.toUpperCase()}
              </button>
            `).join('')}
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-section-title">Stats</div>
          ${g.result ? renderStats(g.result.headers) : '<p style="font-size:12px;color:var(--text-3);">Run a generation to see timing.</p>'}
        </div>
      </div>
    </div>
  `;

  // Wire up events
  const textarea = el.querySelector('#gen-text');
  textarea.addEventListener('input', () => {
    state.generate.text = textarea.value;
    // update char count only
    const l = textarea.value.length;
    const cc = el.querySelector('.gen-char-count');
    cc.textContent = `${l.toLocaleString()} / ${MAX.toLocaleString()} chars`;
    cc.className = `gen-char-count ${l > MAX ? 'over' : l > 2700 ? 'warn' : ''}`;
    el.querySelector('#gen-btn').disabled = l > MAX || state.generate.loading;
  });

  el.querySelectorAll('[data-preset]').forEach(btn => {
    btn.addEventListener('click', () => {
      const picked = btn.dataset.preset;
      if (picked === 'custom') {
        if (state.generate.preset === 'custom') {
          // already on custom — toggle panel open/closed
          state.generate.customPanelOpen = !state.generate.customPanelOpen;
          const panel = el.querySelector('#custom-panel');
          if (panel) { panel.outerHTML = renderCustomPanel(state.generate); wireCustomPanel(el); }
        } else {
          // switching to custom — open panel
          state.generate.preset = 'custom';
          state.generate.customPanelOpen = true;
          render();
        }
      } else {
        // switching away from custom
        state.generate.preset = picked;
        state.generate.customPanelOpen = false;
        el.querySelectorAll('[data-preset]').forEach(b =>
          b.classList.toggle('active', b.dataset.preset === picked));
        const panel = el.querySelector('#custom-panel');
        if (panel) panel.remove();
      }
    });
  });

  el.querySelectorAll('[data-format]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.generate.format = btn.dataset.format;
      el.querySelectorAll('[data-format]').forEach(b => b.classList.toggle('active', b.dataset.format === btn.dataset.format));
    });
  });

  el.querySelector('#voice-select').addEventListener('change', (e) => {
    state.generate.voice_name = e.target.value || null;
  });

  el.querySelector('#gen-btn').addEventListener('click', runGenerate);

  // Wire custom panel if visible
  if (g.preset === 'custom') wireCustomPanel(el);

  // Wire up audio player if result exists
  if (g.result) wirePlayer(el);
}

function renderPlayer(result) {
  if (!result) return `
    <div class="audio-player">
      <div class="player-header">Output</div>
      <div class="player-empty">
        <div style="font-size:32px;margin-bottom:8px;opacity:0.3;">🎵</div>
        Your audio will appear here after generation.
      </div>
    </div>
  `;

  return `
    <div class="audio-player">
      <div class="player-header" style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0;">
        <span>Output</span>
        <a id="player-dl" href="${result.url}" download="${(state.generate.voice_name || 'generic')}-${new Date().toISOString().slice(0,19).replace('T','-').replace(/:/g,'')}.${state.generate.format}" class="btn btn-secondary btn-sm">↓ Download</a>
      </div>
      <div class="player-waveform" id="player-waveform">
        ${Array.from({length: 40}, (_, i) => {
          const h = 10 + Math.random() * 30;
          return `<div class="pw-bar" style="height:${h}px" data-idx="${i}"></div>`;
        }).join('')}
      </div>
      <div class="player-controls">
        <button class="play-btn" id="play-btn" aria-label="Play/Pause">▶</button>
        <span class="player-time" id="player-time">0:00 / 0:00</span>
        <input type="range" class="player-seek" id="player-seek" min="0" max="100" value="0">
      </div>
    </div>
  `;
}

function renderStats(headers) {
  const durSec = parseFloat(headers['x-audio-duration-seconds'] || 0);
  const genSec = parseFloat(headers['x-generation-seconds'] || 0);
  const rtf  = parseFloat(headers['x-rtf'] || 0).toFixed(2);
  const enc  = headers['x-mp3-encode-seconds'] ? parseFloat(headers['x-mp3-encode-seconds']) : null;
  const chunks = headers['x-chunks'] || '—';
  const device = headers['x-device'] || '—';
  return `
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-label">Duration</div><div class="stat-value">${_fmtDuration(durSec)}</div></div>
      <div class="stat-item"><div class="stat-label">Generation</div><div class="stat-value">${_fmtDuration(genSec)}</div></div>
      <div class="stat-item"><div class="stat-label">RTF</div><div class="stat-value">${rtf}×</div></div>
      <div class="stat-item"><div class="stat-label">Chunks</div><div class="stat-value">${chunks}</div></div>
      ${enc != null ? `<div class="stat-item"><div class="stat-label">Encode</div><div class="stat-value">${_fmtDuration(enc)}</div></div>` : ''}
      <div class="stat-item"><div class="stat-label">Device</div><div class="stat-value" style="font-size:12px;">${device}</div></div>
    </div>
  `;
}

let _audio = null;

function wirePlayer(el) {
  if (!state.generate.result) return;
  const url = state.generate.result.url;

  if (_audio) { _audio.pause(); _audio = null; }
  _audio = new Audio(url);

  const playBtn  = el.querySelector('#play-btn');
  const seekEl   = el.querySelector('#player-seek');
  const timeEl   = el.querySelector('#player-time');
  const bars     = el.querySelectorAll('.pw-bar');

  function fmt(s) {
    const m = Math.floor(s / 60);
    return `${m}:${String(Math.floor(s % 60)).padStart(2,'0')}`;
  }

  _audio.addEventListener('timeupdate', () => {
    const pct = _audio.duration ? (_audio.currentTime / _audio.duration) * 100 : 0;
    seekEl.value = pct;
    timeEl.textContent = `${fmt(_audio.currentTime)} / ${fmt(_audio.duration || 0)}`;
    const playedCount = Math.floor((pct / 100) * bars.length);
    bars.forEach((b, i) => b.classList.toggle('played', i < playedCount));
  });

  _audio.addEventListener('ended', () => { playBtn.textContent = '▶'; bars.forEach(b => b.classList.remove('played')); });

  playBtn.addEventListener('click', () => {
    if (_audio.paused) { _audio.play(); playBtn.textContent = '⏸'; }
    else               { _audio.pause(); playBtn.textContent = '▶'; }
  });

  seekEl.addEventListener('input', () => {
    if (_audio.duration) _audio.currentTime = (_audio.duration * seekEl.value) / 100;
  });
}

function _fmtDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function _avgRtf() {
  // Derive average RTF from recent completed jobs; fall back to 0.3
  const completed = state.jobs.filter(j => j.status === 'done' && j.rtf != null);
  if (!completed.length) return 0.3;
  const avg = completed.slice(0, 10).reduce((s, j) => s + j.rtf, 0) / Math.min(completed.length, 10);
  return avg > 0 ? avg : 0.3;
}

async function runGenerate() {
  const text = state.generate.text.trim();
  if (!text) { toastError('Please enter some text first.'); return; }

  if (state.generate.result?.url) URL.revokeObjectURL(state.generate.result.url);
  state.generate.result = null;
  state.generate.loading = true;
  if (_audio) { _audio.pause(); _audio = null; }
  render();

  // ── ETA estimation ──────────────────────────────────────────────────────
  // Estimate: ~140 chars/sec of speech × avg RTF × 1.3x safety factor
  const charsPerSec = 140;
  const estimatedAudioSec = text.length / charsPerSec;
  const avgRtf = _avgRtf();
  const safetyFactor = 1.3;  // Account for variability and overhead
  const estimatedGenSec = estimatedAudioSec * avgRtf * safetyFactor;

  let elapsed   = 0;
  let etaTimer  = null;

  function updateEta() {
    elapsed++;
    const fill     = document.getElementById('eta-bar-fill');
    const elapsedEl  = document.getElementById('eta-elapsed');
    const remainEl   = document.getElementById('eta-remaining');
    if (!fill) return;

    const pct       = Math.min(92, (elapsed / estimatedGenSec) * 100);
    const remaining = Math.max(0, Math.round(estimatedGenSec - elapsed));
    fill.style.width = pct + '%';
    elapsedEl.textContent = `${_fmtDuration(elapsed)} elapsed`;

    // Show realistic remaining time; switch to "Generating..." if estimate exceeded
    if (remaining > 5) {
      remainEl.textContent = `~${_fmtDuration(remaining)} remaining`;
    } else if (remaining > 0) {
      remainEl.textContent = `${remaining}s remaining`;
    } else {
      remainEl.textContent = 'Finalizing…';
    }
  }

  etaTimer = setInterval(updateEta, 1000);

  try {
    const isCustom = state.generate.preset === 'custom';
    const { blob, headers } = await generateTTS({
      text,
      preset:        isCustom ? 'default' : state.generate.preset,
      voice_name:    state.generate.voice_name || undefined,
      output_format: state.generate.format,
      ...(isCustom ? state.generate.customParams : {}),
    });

    // Snap bar to 100%
    const fill = document.getElementById('eta-bar-fill');
    if (fill) fill.style.width = '100%';

    const url = URL.createObjectURL(blob);
    state.generate.result = { blob, headers, url };
    toastSuccess('Audio generated!');
  } catch (err) {
    toastError(err.message);
  } finally {
    clearInterval(etaTimer);
    state.generate.loading = false;
    render();
  }
}

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });

  // ── Record tab wiring ──────────────────────────────────────────────────────
  const recBtn        = el.querySelector('#rec-btn');
  const recIcon       = el.querySelector('#rec-icon');
  const recTimer      = el.querySelector('#rec-timer');
  const recStatus     = el.querySelector('#rec-status');
  const recWaveform   = el.querySelector('#rec-waveform');
  const recCanvas     = el.querySelector('#rec-canvas');
  const recPreview    = el.querySelector('#rec-preview');
  const recAudio      = el.querySelector('#rec-audio');
  const recDiscard    = el.querySelector('#rec-discard');
  const recNameInput  = el.querySelector('#rec-name-input');
  const recDescInput  = el.querySelector('#rec-desc-input');
  const recUploadBtn  = el.querySelector('#rec-upload-btn');

  if (recBtn) {
    // Show banner and hide UI on non-secure contexts (http:// on iOS/Safari blocks mediaDevices)
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      const banner = el.querySelector('#rec-insecure-banner');
      const recUi  = el.querySelector('#rec-ui');
      if (banner) banner.style.display = 'block';
      if (recUi)  recUi.style.display  = 'none';
    } else {

    let mediaRecorder = null;
    let audioChunks   = [];
    let recordedBlob  = null;
    let recordedUrl   = null;
    let timerInterval = null;
    let animFrame     = null;
    let audioCtx      = null;
    let analyser      = null;
    let elapsed       = 0;
    const MAX_SECONDS = 300; // 5 minutes
    const WARN_AT     = 240; // warn at 4:00 remaining = 1 min left

    const recHint       = el.querySelector('#rec-hint');
    const recNoMicBanner = el.querySelector('#rec-no-mic-banner');
    const recRetryBtn   = el.querySelector('#rec-retry-btn');
    const recUiGrid     = el.querySelector('#rec-ui');

    async function checkMic() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const hasMic  = devices.some(d => d.kind === 'audioinput');
        recNoMicBanner.style.display = hasMic ? 'none' : 'block';
        recUiGrid.style.display      = hasMic ? 'grid' : 'none';
      } catch (_) {
        // enumerateDevices failed — show the UI and let getUserMedia surface the real error
      }
    }
    checkMic();
    recRetryBtn.addEventListener('click', checkMic);

    function fmtTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function drawWaveform() {
      if (!analyser || !recCanvas) return;
      const W = recCanvas.width  = recCanvas.offsetWidth  || 340;
      const H = recCanvas.height = recCanvas.offsetHeight || 48;
      const ctx = recCanvas.getContext('2d');
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);

      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const step = W / data.length;
      data.forEach((v, i) => {
        const x = i * step;
        const y = (v / 128) * (H / 2);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
      animFrame = requestAnimationFrame(drawWaveform);
    }

    async function startRecording() {
      try {
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (e) {
          if (e.name === 'OverconstrainedError') {
            stream = await navigator.mediaDevices.getUserMedia({ audio: {} });
          } else { throw e; }
        }

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        audioCtx.createMediaStreamSource(stream).connect(analyser);

        const preferredTypes = [
          'audio/webm;codecs=opus',
          'audio/webm',
          'audio/mp4',
          'audio/ogg;codecs=opus',
          '',
        ];
        const mimeType = preferredTypes.find(t => !t || MediaRecorder.isTypeSupported(t)) ?? '';

        mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        audioChunks   = [];
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          audioCtx?.close();
          cancelAnimationFrame(animFrame);
          recordedBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          if (recordedUrl) { URL.revokeObjectURL(recordedUrl); }
          recordedUrl  = URL.createObjectURL(recordedBlob);
          recAudio.src = recordedUrl;
          recWaveform.style.display = 'none';
          recPreview.style.display  = 'flex';
          recIcon.textContent = '⏺';
          recBtn.classList.remove('recording');
          recBtn.title = 'Start new recording';
          recStatus.textContent = 'Recording ready — preview below';
          recHint.textContent   = '30–60 seconds is usually enough for a great voice profile';
          recHint.style.color   = '';
          recUploadBtn.disabled = !recNameInput.value.trim();
        };

        mediaRecorder.start(100);
        elapsed = 0;
        recTimer.textContent = fmtTime(0);
        timerInterval = setInterval(() => {
          elapsed++;
          recTimer.textContent = fmtTime(elapsed);
          if (elapsed === WARN_AT) {
            recStatus.textContent = 'Less than 1 minute remaining';
            recHint.textContent   = 'Recording will auto-stop at 5:00';
            recHint.style.color   = 'var(--accent)';
          }
          if (elapsed >= MAX_SECONDS) { stopRecording(); }
        }, 1000);

        recBtn.classList.add('recording');
        recBtn.classList.remove('has-audio');
        recIcon.textContent = '⏹';
        recBtn.title = 'Stop recording';
        recStatus.textContent = 'Recording…';
        recHint.textContent   = '30–60 seconds is usually enough for a great voice profile';
        recHint.style.color   = '';
        recPreview.style.display  = 'none';
        recWaveform.style.display = 'flex';
        recUploadBtn.disabled = true;
        drawWaveform();

      } catch (err) {
        recStatus.textContent = err.name === 'NotAllowedError'
          ? 'Microphone access denied — check browser permissions'
          : err.name === 'NotFoundError'
          ? 'No microphone found — check your device settings'
          : `Error (${err.name}): ${err.message}`;
        console.error('Recording error:', err);
      }
    }

    function stopRecording() {
      clearInterval(timerInterval);
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    }

    recBtn.addEventListener('click', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
      } else {
        startRecording();
      }
    });

    recDiscard.addEventListener('click', () => {
      if (recordedUrl) { URL.revokeObjectURL(recordedUrl); recordedUrl = null; }
      recordedBlob = null;
      recAudio.src = '';
      recPreview.style.display  = 'none';
      recWaveform.style.display = 'none';
      recTimer.textContent      = '0:00';
      recStatus.textContent     = 'Press to start recording';
      recHint.textContent       = '30–60 seconds is usually enough for a great voice profile';
      recHint.style.color       = '';
      recBtn.classList.remove('recording', 'has-audio');
      recIcon.textContent       = '⏺';
      recBtn.title              = 'Start recording';
      recUploadBtn.disabled     = true;
    });

    recNameInput.addEventListener('input', () => {
      recUploadBtn.disabled = !recNameInput.value.trim() || !recordedBlob;
    });

    recUploadBtn.addEventListener('click', async () => {
      if (!recordedBlob || !recNameInput.value.trim()) return;
      recUploadBtn.disabled = true;
      recUploadBtn.innerHTML = '<span class="spinner"></span> Saving…';

      // Inject progress UI below the button
      let progressWrap = el.querySelector('#rec-progress-wrap');
      if (!progressWrap) {
        progressWrap = document.createElement('div');
        progressWrap.id = 'rec-progress-wrap';
        progressWrap.className = 'upload-progress-wrap';
        progressWrap.innerHTML = `
          <div class="upload-progress-track"><div class="upload-progress-fill" id="rec-progress-fill" style="width:0%"></div></div>
          <div class="upload-progress-label">
            <span id="rec-progress-pct">0%</span>
            <span id="rec-progress-eta">Calculating…</span>
          </div>`;
        recUploadBtn.insertAdjacentElement('afterend', progressWrap);
      }

      const ext  = recordedBlob.type.includes('mp4') ? 'mp4' : 'webm';
      const file = new File([recordedBlob], `recording.${ext}`, { type: recordedBlob.type });
      const fd   = new FormData();
      fd.append('name', recNameInput.value.trim());
      fd.append('file', file);
      fd.append('tags', 'recorded');
      if (recDescInput.value.trim()) fd.append('description', recDescInput.value.trim());

      function fmtBytes(b) {
        return b > 1048576 ? `${(b/1048576).toFixed(1)} MB` : `${Math.round(b/1024)} KB`;
      }

      try {
        const voice = await uploadVoiceWithProgress(fd, ({ percent, bytesLoaded, bytesTotal, etaSec, speedBps }) => {
          el.querySelector('#rec-progress-fill').style.width = percent + '%';
          el.querySelector('#rec-progress-pct').textContent  = `${percent}% · ${fmtBytes(bytesLoaded)} of ${fmtBytes(bytesTotal)}`;
          el.querySelector('#rec-progress-eta').textContent  = etaSec != null
            ? etaSec > 1 ? `~${Math.ceil(etaSec)}s remaining` : 'Almost done…'
            : `${fmtBytes(speedBps)}/s`;
        });
        el.querySelector('#rec-progress-fill').style.width = '100%';
        el.querySelector('#rec-progress-pct').textContent  = '100%';
        el.querySelector('#rec-progress-eta').textContent  = 'Done!';

        state.voices = await listVoices();
        toastSuccess(`Voice "${voice.name}" saved from recording.`);
        render();
      } catch (err) {
        toastError(err.message);
        recUploadBtn.disabled = false;
        recUploadBtn.textContent = 'Save Recording';
        progressWrap?.remove();
      }
    });
    } // end else (mediaDevices available)
  }
}

  const tagBadges = (v.tags || []).map(t => {
    const cls = t === 'uploaded' ? 'tag-uploaded' : t === 'auto-import' ? 'tag-auto-import' : '';
    return `<span class="tag-badge ${cls}">${escHtml(t)}</span>`;
  }).join('');

  return `
    <div class="voice-card" data-voice="${escAttr(v.name)}">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="voice-avatar">🎙</div>
        <div style="min-width:0;">
          <div class="voice-name">${escHtml(v.name)}</div>
          ${v.description ? `<div class="voice-desc">${escHtml(v.description)}</div>` : ''}
        </div>
      </div>
      ${tagBadges ? `<div style="display:flex;flex-wrap:wrap;gap:4px;">${tagBadges}</div>` : ''}
      <div class="voice-actions">
        <button class="btn btn-secondary btn-sm" data-use-voice="${escAttr(v.name)}">Use</button>
        <button class="btn btn-ghost btn-sm" data-edit-voice="${escAttr(v.name)}">Edit</button>

}

// ── Edit modal ────────────────────────────────────────────────────────────────

function openEditModal(voice) {
  let editTags = [...(voice.tags || [])];
  let showAdvanced = false;

  function buildModal() {
    const existing = document.getElementById('edit-modal-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'edit-modal-overlay';

    overlay.innerHTML = `
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <span class="modal-title" id="modal-title">Edit — ${escHtml(voice.name)}</span>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">

          <div class="field">
            <label class="label" for="edit-desc">Description</label>
            <input id="edit-desc" class="input" type="text" value="${escAttr(voice.description || '')}" placeholder="Short description">
          </div>

          <div>
            <div class="modal-section-title">Tags</div>
            <div class="tag-editor" id="tag-editor">
              ${editTags.map(t => `
                <span class="tag-chip">
                  ${escHtml(t)}
                  <button class="tag-chip-remove" data-remove-tag="${escAttr(t)}" aria-label="Remove tag ${escHtml(t)}">✕</button>
                </span>
              `).join('')}
              <input id="tag-add-input" class="tag-add-input" type="text" placeholder="+ add tag" autocomplete="off">
            </div>
          </div>

          <div>
            <button class="advanced-toggle" id="advanced-toggle">
              <span id="advanced-arrow">${showAdvanced ? '▾' : '▸'}</span>
              Advanced TTS parameters
            </button>
            <div id="advanced-params" style="display:${showAdvanced ? 'block' : 'none'}">
              <div class="params-grid">
                ${[
                  ['exaggeration', 'Exaggeration', voice.exaggeration],
                  ['cfg_weight',   'CFG Weight',   voice.cfg_weight],
                  ['temperature',  'Temperature',  voice.temperature],
                  ['repetition_penalty', 'Repetition Penalty', voice.repetition_penalty],
                  ['top_p', 'Top P', voice.top_p],
                  ['min_p', 'Min P', voice.min_p],
                ].map(([key, label, val]) => `
                  <div class="param-field">
                    <label for="param-${key}">${label}</label>
                    <input id="param-${key}" type="number" step="0.01" min="0" max="2"
                      value="${val != null ? val : ''}" placeholder="inherit from tone">
                  </div>
                `).join('')}
              </div>
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-save">Save changes</button>
        </div>
      </div>
    `;

    document.body.appendChild(overlay);

    // Close
    const close = () => overlay.remove();
    overlay.querySelector('#modal-close').addEventListener('click', close);
    overlay.querySelector('#modal-cancel').addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
    });

    // Remove tag chips
    overlay.querySelectorAll('[data-remove-tag]').forEach(btn => {
      btn.addEventListener('click', () => {
        editTags = editTags.filter(t => t !== btn.dataset.removeTag);
        buildModal();
      });
    });

    // Add tag on Enter or comma
    const tagInput = overlay.querySelector('#tag-add-input');
    tagInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const val = tagInput.value.replace(/,/g, '').trim().toLowerCase();
        if (val && !editTags.includes(val)) { editTags.push(val); buildModal(); }
        else tagInput.value = '';
      }
    });

    // Advanced toggle
    overlay.querySelector('#advanced-toggle').addEventListener('click', () => {
      showAdvanced = !showAdvanced;
      overlay.querySelector('#advanced-params').style.display = showAdvanced ? 'block' : 'none';
      overlay.querySelector('#advanced-arrow').textContent = showAdvanced ? '▾' : '▸';
    });

    // Save
    overlay.querySelector('#modal-save').addEventListener('click', async () => {
      const saveBtn = overlay.querySelector('#modal-save');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span>';

      const getParam = (id) => {
        const v = overlay.querySelector(`#param-${id}`)?.value.trim();
        return v !== '' && v != null ? parseFloat(v) : null;
      };

      try {
        const updated = await patchVoice(voice.name, {
          description: overlay.querySelector('#edit-desc').value.trim() || null,
          tags: editTags,
          exaggeration:       getParam('exaggeration'),
          cfg_weight:         getParam('cfg_weight'),
          temperature:        getParam('temperature'),
          repetition_penalty: getParam('repetition_penalty'),
          top_p:              getParam('top_p'),
          min_p:              getParam('min_p'),
        });
        // Update in-memory state
        const idx = state.voices.findIndex(v => v.name === voice.name);
        if (idx !== -1) state.voices[idx] = updated;
        toastSuccess(`"${voice.name}" updated.`);
        close();
        render();
      } catch (err) {
        toastError(err.message);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save changes';
      }
    });
  }

  buildModal();
}

// ── Screen: History ───────────────────────────────────────────────────────────

let _histFilter = 'all';

function renderHistory(el, actions) {
  const refresh = document.createElement('button');
  refresh.className = 'btn btn-secondary btn-sm';
  refresh.textContent = '↺ Refresh';
  refresh.addEventListener('click', async () => {
    refresh.disabled = true;
    state.jobs = await listJobs({ limit: 100 });
    render();
  });
  actions.appendChild(refresh);

  const filtered = _histFilter === 'all' ? state.jobs : state.jobs.filter(j => j.status === _histFilter);

  el.innerHTML = `
    <div>
      <div class="history-filters">
        ${['all','completed','failed','processing'].map(s => `
          <button class="filter-pill ${_histFilter === s ? 'active' : ''}" data-filter="${s}">
            ${s.charAt(0).toUpperCase() + s.slice(1)}
            ${s === 'all' ? `(${state.jobs.length})` : `(${state.jobs.filter(j => j.status === s).length})`}
          </button>
        `).join('')}
      </div>

      ${filtered.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No jobs yet</div><div class="empty-sub">Your generation history will appear here.</div></div>`
        : `<div class="history-scroll">
          <table class="history-table">
            <thead><tr>
              <th>Status</th>
              <th>Voice</th>
              <th>Tone</th>
              <th>Text</th>
              <th>Duration</th>
              <th>RTF</th>
              <th>Time</th>
              <th>Request ID</th>
            </tr></thead>
            <tbody>
              ${filtered.map(j => `
                <tr>
                  <td>${statusBadge(j.status)}</td>
                  <td style="font-size:12px;color:var(--text-2);">${escHtml(j.voice_name || 'Generic')}</td>
                  <td style="font-size:12px;color:var(--text-2);">${escHtml(j.preset || '—')}</td>
                  <td class="text-cell">
                    <div class="copy-cell">
                      <span title="${escAttr(j.text)}">${escHtml(j.text?.slice(0,80) ?? '—')}${(j.text?.length ?? 0) > 80 ? '…' : ''}</span>
                      <button class="copy-btn" data-copy="${escAttr(j.text ?? '')}" title="Copy text">⎘</button>
                    </div>
                  </td>
                  <td style="font-size:12px;">${j.audio_duration_s ? _fmtDuration(j.audio_duration_s) : '—'}</td>
                  <td style="font-size:12px;">${j.rtf ? j.rtf.toFixed(2) + '×' : '—'}</td>
                  <td style="font-size:12px;color:var(--text-2);white-space:nowrap;">${fmtDate(j.created_at)}</td>
                  <td class="rid-cell">
                    <div class="copy-cell">
                      <span title="${escAttr(j.request_id)}">${(j.request_id || '').slice(0, 8)}…</span>
                      <button class="copy-btn" data-copy="${escAttr(j.request_id ?? '')}" title="Copy request ID">⎘</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`
      }
    </div>
  `;

  el.querySelectorAll('[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => { _histFilter = btn.dataset.filter; render(); });
  });

  el.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const text = btn.dataset.copy ?? '';
      const ok = await _copyText(text);
      if (ok) {
        btn.classList.add('copied');
        btn.textContent = '✓';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 1500);
        toastSuccess('Copied to clipboard');
      } else {
        toastError('Copy failed');
      }
    });
  });
}

function statusBadge(status) {
  const map = { completed: 'badge-green', failed: 'badge-red', processing: 'badge-yellow' };
  return `<span class="badge ${map[status] ?? ''}">${status}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
  return `${mm}/${dd}/${yyyy} at ${time}`;
}

// ── Utilities ─────────────────────────────────────────────────────────────────

// Clipboard helper — falls back to execCommand for http:// contexts
async function _copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch {}
  }
  // execCommand fallback (works on http://localhost)
  try {
    const ta = Object.assign(document.createElement('textarea'), {
      value: text, style: 'position:fixed;opacity:0',
    });
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    ta.remove();
    return ok;
  } catch { return false; }
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ── Bootstrap ─────────────────────────────────────────────────────────────────

async function boot() {
  // Render skeleton immediately
  render();

  try {
    const [health, voices, presets, jobs] = await Promise.all([
      healthCheck(),
      listVoices(),
      listPresets(),
      listJobs({ limit: 100 }),
    ]);

    state.health  = health;
    state.voices  = voices;
    state.presets = presets;
    state.jobs    = jobs;

    const statusEl = document.getElementById('server-status');
    const deviceLabel = { mps: 'Ready · Apple MPS', cpu: 'Ready · CPU', cuda: 'Ready · CUDA' }[health.device] ?? `Ready · ${health.device ?? 'ok'}`;
    statusEl.innerHTML = `<span class="dot dot-green dot-pulse"></span><span>${deviceLabel}</span>`;
  } catch (err) {
    const statusEl = document.getElementById('server-status');
    statusEl.innerHTML = `<span class="dot dot-red"></span><span>Server offline</span>`;
    toastError('Cannot reach Vox server. Is it running?');
  }

  render();
}

boot();
